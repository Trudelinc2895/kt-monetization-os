name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6h UTC

jobs:
  sast:
    name: SAST — Bandit + pip-audit + TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: pip install bandit pip-audit safety

      - name: Bandit SAST (Python)
        run: |
          bandit -r backend/ -f json -o bandit-report.json \
            -x backend/tests/ --severity-level medium || true
          bandit -r backend/ -f txt --severity-level high

      - name: pip-audit (CVE scan)
        run: |
          pip-audit -r backend/requirements.txt \
            --format json -o pip-audit-report.json || true
          pip-audit -r backend/requirements.txt

      - name: Safety check
        run: |
          safety check -r backend/requirements.txt \
            --output text || true

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          extra_args: --only-verified

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
