# /etc/fail2ban/filter.d/caddy-auth.conf
# Detect brute-force on API auth endpoints from Caddy JSON access logs.
# Caddy writes one JSON object per line. Example relevant fields:
#   {"ts":1712000000.123,...,"request":{"remote_ip":"1.2.3.4","uri":"/api/v1/auth/login",...},...,"status":401}
#
# Installed by fresh-install.sh: cp infra/fail2ban/caddy-auth.conf /etc/fail2ban/filter.d/

[Definition]

# Match lines where the remote_ip is the suspect and the response is a 4xx on auth endpoints.
# Works for both client_ip (behind proxy) and remote_ip (direct).
failregex = ^.*"(?:remote_ip|client_ip)":"<HOST>".*"uri":"/api/v1/auth/(?:login|token|register)".*"status":4\d\d.*$
            ^.*"uri":"/api/v1/auth/(?:login|token|register)".*"(?:remote_ip|client_ip)":"<HOST>".*"status":4\d\d.*$

ignoreregex =

# Caddy timestamps are Unix epoch floats: {"ts":1712000000.123,...}
datepattern = "ts":%%s\.%%f
              %%s\.%%f
